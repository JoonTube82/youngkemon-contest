<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6학년 영어 RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; background-color: #f8fafc; color: #334155; }
        .magic-card { background: white; border-radius: 2.5rem; box-shadow: 0 20px 50px rgba(99, 102, 241, 0.1); border: 4px solid #fff; }
        .spell-input { border: 3px solid #e2e8f0; border-radius: 1.5rem; padding: 1.2rem; width: 100%; text-align: center; font-size: 1.8rem; outline: none; transition: all 0.2s; }
        .spell-input:focus { border-color: #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.1); }
        .btn-magic { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border-radius: 1.5rem; padding: 1.2rem; font-size: 1.4rem; font-weight: bold; width: 100%; box-shadow: 0 6px 0 #4338ca; transition: all 0.1s; cursor: pointer; border: none; }
        .btn-magic:active { transform: translateY(4px); box-shadow: 0 2px 0 #4338ca; }
        .btn-magic:disabled { opacity: 0.6; cursor: wait; }
        canvas { image-rendering: pixelated; border-radius: 2rem; width: 100%; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(30, 27, 75, 0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
        .modal-box { background: white; padding: 40px; border-radius: 2.5rem; text-align: center; max-width: 400px; width: 100%; border: 6px solid #fff; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        
        /* 레이아웃 조정을 위한 추가 스타일 */
        .admin-view-container { display: none; }
        .game-view-container { display: none; }
        .login-view-container { display: block; }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-[480px]">
        <!-- 1. 로그인 뷰 -->
        <div id="login-view" class="login-view-container magic-card p-10 text-center">
            <div class="text-6xl mb-4">🧙‍♀️</div>
            <h1 class="text-4xl text-indigo-600 mb-2 font-black italic">6학년 영어 RPG</h1>
            <p class="text-slate-400 mb-8 font-normal">이름과 암호를 입력하세요</p>
            <div class="space-y-4">
                <input type="text" id="user-id" class="spell-input text-xl p-4 border-2" placeholder="이름 (아이디)" autocomplete="off">
                <input type="password" id="user-pw" class="spell-input text-xl p-4 border-2" placeholder="비밀번호" onkeyup="if(event.key==='Enter')window.handleLogin()">
                <button id="login-btn" onclick="window.handleLogin()" class="btn-magic mt-4">마법 학교 입장하기</button>
            </div>
            <p id="login-status" class="text-slate-300 text-xs mt-4 min-h-[1rem]">마법 서버와 연결 중...</p>
        </div>

        <!-- 2. 게임 뷰 -->
        <div id="game-view" class="game-view-container">
            <div class="bg-white rounded-3xl p-5 mb-4 shadow-lg flex justify-between items-center border-b-4 border-indigo-100">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <span id="rank-badge" class="text-[10px] px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-600 font-bold uppercase tracking-wider">ROOKIE</span>
                        <button onclick="window.toggleAdmin()" class="text-slate-300 text-xs hover:text-indigo-500 font-bold">⚙️ 관리자</button>
                    </div>
                    <h2 class="text-3xl font-bold text-slate-800"><span id="player-name">학생</span> <span class="text-indigo-500 font-normal text-lg ml-1">Lv.<span id="lvl-txt">1</span></span></h2>
                </div>
                <div class="text-right">
                    <span class="text-slate-400 text-[10px] font-bold uppercase">Success</span>
                    <p id="cnt-txt" class="text-2xl font-bold text-slate-700">0</p>
                </div>
            </div>
            
            <div class="magic-card relative overflow-hidden mb-6 shadow-xl">
                <canvas id="gameCanvas" width="400" height="350"></canvas>
                <div class="absolute bottom-4 left-6 right-6 bg-slate-100 h-4 rounded-full overflow-hidden border-2 border-white shadow-inner">
                    <div id="exp-bar" class="h-full bg-gradient-to-r from-indigo-400 to-pink-400 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="bg-indigo-50 rounded-[2.5rem] p-8 shadow-inner border-2 border-indigo-100 text-center">
                <span class="text-indigo-400 text-xs uppercase tracking-widest font-bold">Spell Meaning</span>
                <h3 id="quiz-txt" class="text-3xl text-indigo-600 font-bold mt-1 mb-6 leading-tight break-keep">단어장을 불러오는 중...</h3>
                
                <div class="flex flex-col gap-3 relative">
                    <input type="text" id="spell-in" class="spell-input" placeholder="영단어를 입력하세요" autocomplete="off" onkeyup="if(event.key==='Enter')window.checkMagic()">
                    <button onclick="window.checkMagic()" class="btn-magic">✨ 주문 발동!</button>
                </div>
                <p id="hint-msg" class="text-slate-400 text-[10px] mt-4 font-normal italic">정답을 써야 마법 공격이 나갑니다!</p>
            </div>
            <button onclick="location.reload()" class="w-full text-slate-300 text-[10px] mt-8 hover:text-red-400 font-bold">로그아웃 (새로고침)</button>
        </div>

        <!-- 3. 관리자 뷰 -->
        <div id="admin-view" class="admin-view-container">
            <div class="magic-card p-8 border-4 border-white shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-indigo-600">🛠️ 마법 도감 관리</h2>
                    <button onclick="window.toggleAdmin()" class="bg-slate-100 px-4 py-2 rounded-xl text-xs font-bold text-indigo-600 hover:bg-slate-200">닫기</button>
                </div>
                
                <div class="space-y-3 mb-6 bg-slate-50 p-4 rounded-2xl border">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="new-w" class="p-3 border rounded-xl outline-none text-sm focus:border-indigo-400" placeholder="영단어" autocomplete="off">
                        <input type="text" id="new-m" class="p-3 border rounded-xl outline-none text-sm focus:border-indigo-400" placeholder="뜻" autocomplete="off" onkeyup="if(event.key==='Enter')window.addWord()">
                    </div>
                    <button onclick="window.addWord()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-transform hover:bg-indigo-700">도감에 추가</button>
                </div>
                
                <div class="max-h-[300px] overflow-y-auto pr-2 space-y-2" id="admin-list">
                    <p class="text-center text-sm text-slate-400 py-4">저장된 단어가 없습니다.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 모달 창들 -->
    <div id="custom-alert" class="modal-overlay">
        <div class="modal-box">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">🧙‍♀️ 마법 안내</h2>
            <p id="alert-msg" class="text-slate-600 mb-8"></p>
            <button onclick="window.closeCustomAlert()" class="btn-magic text-sm py-3">확인</button>
        </div>
    </div>
    <div id="custom-confirm" class="modal-overlay">
        <div class="modal-box">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">✨ 마법 계약</h2>
            <p id="confirm-msg" class="text-slate-600 mb-8 font-bold"></p>
            <div class="flex gap-2">
                <button onclick="window.handleConfirmAction(true)" class="btn-magic text-sm py-3 flex-1">네!</button>
                <button onclick="window.handleConfirmAction(false)" class="bg-slate-100 text-slate-500 rounded-2xl flex-1 font-bold hover:bg-slate-200">아니요</button>
            </div>
        </div>
    </div>
    <div id="modal" class="fixed inset-0 bg-indigo-900/80 hidden items-center justify-center z-50 p-6 backdrop-blur-md">
        <div class="bg-white rounded-[3rem] p-10 text-center shadow-2xl scale-110">
            <div class="text-7xl mb-4 animate-bounce">🎊</div>
            <h2 class="text-4xl font-bold text-indigo-600 mb-2 font-black">LEVEL UP!</h2>
            <p id="modal-desc" class="text-lg text-slate-500 mb-8 font-bold">성장했습니다!</p>
            <button onclick="document.getElementById('modal').style.display='none';" class="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-4 rounded-2xl font-bold text-xl active:scale-95 shadow-lg transition-colors">계속하기</button>
        </div>
    </div>

    <!-- 최신 Firebase SDK (모듈 방식) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 선생님 설정 명단 ---
        const STUDENT_LIST = ["서영", "단엘", "라희", "민지", "정훈", "문경", "소윤", "하율", "현수", "시율", "은영", "이담", "훈태", "마스터", "테스트", "선생님"];

        // 플랫폼 환경 변수 활용
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Firebase 초기화
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Init Error:", e);
        }

        // 전역 상태
        window.state = {
            user: null, // 학생 이름
            authUid: null,
            gameData: { level: 1, exp: 0, count: 0 },
            quizzes: [],
            currentQuiz: null,
            shake: 0,
            particles: [],
            monster: { hp: 100, color: "#4ade80", shake: 0 }
        };

        // UI 헬퍼 함수
        let confirmResolve = null;
        window.showCustomAlert = (msg) => {
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('custom-alert').style.display = 'flex';
        };
        window.closeCustomAlert = () => { document.getElementById('custom-alert').style.display = 'none'; };
        
        window.showCustomConfirm = (msg) => {
            return new Promise((resolve) => {
                document.getElementById('confirm-msg').innerText = msg;
                document.getElementById('custom-confirm').style.display = 'flex';
                confirmResolve = resolve;
            });
        };
        window.handleConfirmAction = (result) => {
            document.getElementById('custom-confirm').style.display = 'none';
            if (confirmResolve) confirmResolve(result);
        };

        const setStatus = (msg, isError = false) => {
            const statusEl = document.getElementById('login-status');
            if (statusEl) {
                statusEl.innerText = msg;
                statusEl.className = isError ? "text-red-500 text-xs mt-2 font-bold" : "text-indigo-400 text-xs mt-2 animate-pulse";
            }
        };

        // 데이터베이스 경로 헬퍼
        const getStudentsCollection = () => collection(db, 'artifacts', appId, 'public', 'data', 'students');
        const getStudentDoc = (studentId) => doc(db, 'artifacts', appId, 'public', 'data', 'students', studentId);
        const getWordListCollection = () => collection(db, 'artifacts', appId, 'public', 'data', 'wordList');
        const getWordDoc = (wordId) => doc(db, 'artifacts', appId, 'public', 'data', 'wordList', wordId);

        // --- 인증 초기화 ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Init Error:", error);
                setStatus("서버 접속 지연 중입니다.", true);
            }
        };

        // 앱 시작 시 인증 실행
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.state.authUid = user.uid;
                setStatus("마법 서버 준비 완료! 이름을 입력하세요.");
                document.getElementById('login-btn').disabled = false;
            } else {
                window.state.authUid = null;
                document.getElementById('login-btn').disabled = true;
            }
        });

        // --- 로그인 프로세스 ---
        window.handleLogin = async () => {
            if (!window.state.authUid) return window.showCustomAlert("서버와 아직 연결되지 않았습니다. 잠시만 기다려주세요.");

            const idInput = document.getElementById('user-id').value.trim();
            const pwInput = document.getElementById('user-pw').value.trim();
            const btn = document.getElementById('login-btn');

            if (!idInput || !pwInput) return window.showCustomAlert("이름과 비밀번호를 모두 입력하세요!");
            if (!STUDENT_LIST.includes(idInput)) return window.showCustomAlert(`'${idInput}' 학생은 명단에 없습니다.`);

            btn.disabled = true;
            setStatus("마법 기록 조회 중...");

            try {
                const docRef = getStudentDoc(idInput);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    // 기존 유저
                    const data = docSnap.data();
                    if (data.password !== pwInput) {
                        btn.disabled = false;
                        setStatus("비밀번호 오류", true);
                        return window.showCustomAlert("비밀번호가 틀렸습니다!");
                    }
                    window.state.gameData = data.gameStats || { level: 1, exp: 0, count: 0 };
                    setStatus("접속 성공!");
                    enterGame(idInput);
                } else {
                    // 신규 유저 등록
                    const isConfirmed = await window.showCustomConfirm(`'${idInput}' 학생님, 반가워요!\n입력하신 비밀번호[${pwInput}]를 계속 사용하시겠습니까?`);
                    if (isConfirmed) {
                        await setDoc(docRef, { 
                            id: idInput, 
                            password: pwInput, 
                            gameStats: window.state.gameData, 
                            createdAt: new Date().toISOString()
                        });
                        setStatus("신입 마법사 등록 완료!");
                        enterGame(idInput);
                    } else {
                        btn.disabled = false;
                        setStatus("비밀번호 변경을 위해 취소됨", true);
                        document.getElementById('user-pw').value = '';
                        document.getElementById('user-pw').focus();
                    }
                }
            } catch (error) {
                console.error("Login Check Error:", error);
                btn.disabled = false;
                setStatus("데이터 조회 실패", true);
                window.showCustomAlert("서버 통신 중 문제가 발생했습니다.");
            }
        };

        function enterGame(id) {
            window.state.user = id;
            document.getElementById('player-name').innerText = id;
            
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            
            startMagicRPG();
        }

        // --- 게임 시작 및 실시간 데이터 연동 ---
        let unsubscribeWords = null;

        function startMagicRPG() {
            // 단어장 실시간 감시
            unsubscribeWords = onSnapshot(getWordListCollection(), 
                (snapshot) => {
                    window.state.quizzes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    window.refreshQuiz();
                    window.updateAdminList();
                },
                (error) => {
                    console.error("Snapshot Error:", error);
                    document.getElementById('quiz-txt').innerText = "단어장을 불러올 수 없습니다.";
                }
            );

            // 캐릭터 이미지 로드 (SVG 활용)
            window.charImg = new Image();
            window.charImg.src = getEvoSVG(window.state.gameData.level);

            window.updateUI();
            requestAnimationFrame(gameLoop);
        }

        // --- 클라우드 진행상황 저장 ---
        window.saveProgress = async () => {
            if (!window.state.user) return;
            try {
                await setDoc(getStudentDoc(window.state.user), {
                    gameStats: window.state.gameData
                }, { merge: true });
            } catch (e) { 
                console.error("Cloud Save Error:", e); 
            }
        };

        // --- 단어장 관리 (관리자 기능) ---
        window.toggleAdmin = () => {
            const adminView = document.getElementById('admin-view');
            const gameView = document.getElementById('game-view');
            
            if (adminView.style.display === 'block') {
                adminView.style.display = 'none';
                gameView.style.display = 'block';
            } else {
                adminView.style.display = 'block';
                gameView.style.display = 'none';
            }
        };

        window.addWord = async () => {
            const wInput = document.getElementById('new-w');
            const mInput = document.getElementById('new-m');
            const w = wInput.value.trim();
            const m = mInput.value.trim();
            
            if (!w || !m) {
                return window.showCustomAlert("영단어와 뜻을 모두 입력해주세요.");
            }
            
            try {
                // 단어는 소문자로 변환하여 ID로 사용
                const wordId = w.toLowerCase().replace(/\s+/g, '_');
                await setDoc(getWordDoc(wordId), { word: w, meaning: m, createdAt: Date.now() });
                wInput.value = ''; 
                mInput.value = '';
                wInput.focus();
            } catch (error) {
                console.error("Add Word Error:", error);
                window.showCustomAlert("단어 저장에 실패했습니다.");
            }
        };

        window.delWord = async (id) => {
            if (await window.showCustomConfirm("이 단어를 도감에서 삭제할까요?")) {
                try {
                    await deleteDoc(getWordDoc(id));
                } catch(error) {
                    console.error("Delete Word Error:", error);
                }
            }
        };

        window.updateAdminList = () => {
            const list = document.getElementById('admin-list');
            if(!list) return;
            
            if (window.state.quizzes.length === 0) {
                list.innerHTML = `<p class="text-center text-sm text-slate-400 py-4">저장된 단어가 없습니다.</p>`;
                return;
            }

            // 최신순 정렬
            const sorted = [...window.state.quizzes].sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
            
            list.innerHTML = sorted.map(q => `
                <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-slate-100 mb-2">
                    <div class="truncate">
                        <span class="font-black text-indigo-600 text-lg mr-2">${q.word}</span>
                        <span class="text-slate-600 text-sm">${q.meaning}</span>
                    </div>
                    <button onclick="window.delWord('${q.id}')" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg font-bold text-xs ml-2 shrink-0 transition-colors">삭제</button>
                </div>
            `).join('');
        };

        // --- 게임 로직 ---
        window.refreshQuiz = () => {
            const input = document.getElementById('spell-in');
            const txt = document.getElementById('quiz-txt');
            const hint = document.getElementById('hint-msg');
            
            if (!window.state.quizzes || window.state.quizzes.length === 0) {
                if (txt) txt.innerText = "단어 도감이 비어있습니다";
                if (input) input.disabled = true; 
                return;
            }
            
            if(input) { 
                input.disabled = false; 
                input.value = ''; 
                setTimeout(() => input.focus(), 50); 
            }
            
            hint.innerText = "정답을 써야 마법 공격이 나갑니다!";
            hint.className = "text-slate-400 text-[10px] mt-4 font-normal italic";

            // 랜덤 단어 선택
            window.state.currentQuiz = window.state.quizzes[Math.floor(Math.random() * window.state.quizzes.length)];
            if (txt) txt.innerText = window.state.currentQuiz.meaning;
        };

        window.checkMagic = () => {
            if (!window.state.currentQuiz) return;
            
            const input = document.getElementById('spell-in');
            const typed = input.value.trim().toLowerCase();
            const answer = window.state.currentQuiz.word.toLowerCase();
            
            if (typed === answer) { 
                handleAttack(); 
                window.refreshQuiz(); 
            } else {
                window.state.shake = 15;
                const hint = document.getElementById('hint-msg');
                const firstLetter = window.state.currentQuiz.word.charAt(0);
                hint.innerText = `틀렸어요! (정답 힌트: ${firstLetter}...)`;
                hint.className = "text-red-500 text-[12px] mt-4 font-bold animate-bounce";
                input.value = ''; // 틀리면 입력창 비우기
                input.focus();
            }
        };

        function handleAttack() {
            window.state.gameData.count++; 
            window.state.monster.hp -= 34; 
            window.state.monster.shake = 25;
            
            // 파티클 생성
            for (let i = 0; i < 20; i++) {
                window.state.particles.push({ 
                    x: 280, 
                    y: 220, 
                    vx: (Math.random()-0.5)*20, 
                    vy: (Math.random()-0.5)*20, 
                    life: 1.0, 
                    color: window.state.monster.color 
                });
            }

            // 몬스터 처치
            if (window.state.monster.hp <= 0) {
                window.state.gameData.exp += 40; 
                window.state.monster.hp = 100;
                const colors = ["#4ade80", "#fb923c", "#f87171", "#60a5fa", "#a78bfa", "#f472b6"];
                window.state.monster.color = colors[Math.floor(Math.random() * colors.length)];
            } else { 
                window.state.gameData.exp += 15; 
            }

            // 레벨업 체크
            if (window.state.gameData.exp >= 100) {
                window.state.gameData.exp = window.state.gameData.exp - 100; 
                window.state.gameData.level++;
                
                document.getElementById('modal').style.display = 'flex';
                document.getElementById('modal-desc').innerText = `레벨 ${window.state.gameData.level}(으)로 성장했습니다!`;
                
                // 캐릭터 이미지 업데이트
                window.charImg.src = getEvoSVG(window.state.gameData.level);
            }
            
            window.updateUI(); 
            window.saveProgress();
        }

        window.updateUI = () => {
            const lvlTxt = document.getElementById('lvl-txt'); 
            const cntTxt = document.getElementById('cnt-txt');
            const expBar = document.getElementById('exp-bar'); 
            const rankBadge = document.getElementById('rank-badge');
            
            const lvl = window.state.gameData.level;
            
            if (lvlTxt) lvlTxt.innerText = lvl;
            if (cntTxt) cntTxt.innerText = window.state.gameData.count;
            if (expBar) expBar.style.width = window.state.gameData.exp + "%";
            
            if (rankBadge) {
                if (lvl >= 15) { rankBadge.innerText = "MASTER MAGE"; rankBadge.className = "text-[10px] px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-600 font-bold uppercase tracking-wider"; }
                else if (lvl >= 10) { rankBadge.innerText = "HIGH MAGE"; rankBadge.className = "text-[10px] px-2 py-0.5 rounded-full bg-purple-100 text-purple-600 font-bold uppercase tracking-wider"; }
                else if (lvl >= 5) { rankBadge.innerText = "MAGE"; rankBadge.className = "text-[10px] px-2 py-0.5 rounded-full bg-blue-100 text-blue-600 font-bold uppercase tracking-wider"; }
                else { rankBadge.innerText = "ROOKIE"; rankBadge.className = "text-[10px] px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-600 font-bold uppercase tracking-wider"; }
            }
        };

        // --- 캔버스 렌더링 루프 ---
        function gameLoop() {
            const canvas = document.getElementById('gameCanvas');
            if (!canvas || window.getComputedStyle(document.getElementById('game-view')).display === 'none') {
                requestAnimationFrame(gameLoop);
                return;
            }
            
            const ctx = canvas.getContext('2d');
            
            // 배경
            ctx.clearRect(0, 0, 400, 350); 
            ctx.fillStyle = "#f8fafc"; 
            ctx.fillRect(0, 0, 400, 350);
            
            // 플레이어 흔들림 (틀렸을 때)
            const float = Math.sin(Date.now() / 500) * 10;
            const ms = (Math.random()-0.5) * window.state.shake; 
            if (window.state.shake > 0) window.state.shake *= 0.8;
            
            // 플레이어 그리기
            ctx.save(); 
            ctx.translate(100 + ms, 200 + float);
            if (window.charImg && window.charImg.complete) {
                ctx.drawImage(window.charImg, -75, -75, 150, 150);
            }
            ctx.restore();
            
            // 몬스터 흔들림 (맞았을 때)
            const mns = (Math.random()-0.5) * window.state.monster.shake; 
            if (window.state.monster.shake > 0) window.state.monster.shake *= 0.8;
            
            // 몬스터 그리기 (슬라임 형태)
            ctx.save(); 
            ctx.translate(280 + mns, 220); 
            ctx.fillStyle = window.state.monster.color; 
            ctx.beginPath(); 
            ctx.arc(0, 0, 45, Math.PI, 0); 
            ctx.fillRect(-45, 0, 90, 20); 
            ctx.fill();
            
            // 몬스터 눈
            ctx.fillStyle = "white"; 
            ctx.fillRect(-15, -10, 8, 8); 
            ctx.fillRect(10, -10, 8, 8);
            ctx.fillStyle = "black";
            ctx.fillRect(-13, -8, 4, 4); 
            ctx.fillRect(12, -8, 4, 4);
            
            // 몬스터 체력바
            ctx.fillStyle = "#e2e8f0";
            ctx.fillRect(-35, -55, 70, 6);
            ctx.fillStyle = "#ef4444"; 
            ctx.fillRect(-35, -55, 70 * (window.state.monster.hp/100), 6); 
            ctx.restore();
            
            // 타격 이펙트 파티클
            window.state.particles.forEach((p, i) => {
                p.x += p.vx; 
                p.y += p.vy; 
                p.life -= 0.05; 
                ctx.globalAlpha = Math.max(0, p.life); 
                ctx.fillStyle = p.color; 
                ctx.fillRect(p.x, p.y, 6, 6);
                if (p.life <= 0) window.state.particles.splice(i, 1);
            });
            ctx.globalAlpha = 1.0; 
            
            requestAnimationFrame(gameLoop);
        }

        // SVG 캐릭터 생성 함수 (레벨에 따라 색상과 형태가 약간 변화)
        function getEvoSVG(level) {
            // 레벨별 색상 테마
            let color = "#7c3aed"; // 기본 보라색
            let hatColor = "#4c1d95";
            let staffColor = "#b45309";
            let orbColor = "#fde047";

            if (level >= 15) { color = "#be123c"; hatColor = "#881337"; orbColor = "#67e8f9"; } // 전설
            else if (level >= 10) { color = "#1d4ed8"; hatColor = "#1e3a8a"; orbColor = "#fca5a5"; } // 고급
            else if (level >= 5) { color = "#047857"; hatColor = "#064e3b"; orbColor = "#fde047"; } // 중급
            
            const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <!-- 망토 -->
                <path d="M25,50 Q10,90 20,95 L80,95 Q90,90 75,50 Z" fill="${color}" opacity="0.9"/>
                <!-- 몸통 -->
                <rect x="35" y="45" width="30" height="40" rx="10" fill="#ffedd5" />
                <path d="M35,45 Q50,60 65,45 Z" fill="${hatColor}" opacity="0.3" />
                <!-- 마법사 모자 -->
                <path d="M20,45 Q50,40 80,45 L50,5 Z" fill="${hatColor}" />
                <!-- 모자 챙 -->
                <ellipse cx="50" cy="45" rx="35" ry="5" fill="${color}" />
                <!-- 눈 -->
                <circle cx="43" cy="55" r="3" fill="#1e293b" />
                <circle cx="57" cy="55" r="3" fill="#1e293b" />
                <!-- 볼터치 -->
                <ellipse cx="38" cy="60" rx="4" ry="2" fill="#fda4af" opacity="0.6"/>
                <ellipse cx="62" cy="60" rx="4" ry="2" fill="#fda4af" opacity="0.6"/>
                <!-- 마법 지팡이 -->
                <rect x="75" y="30" width="4" height="60" rx="2" fill="${staffColor}" transform="rotate(15 75 30)" />
                <!-- 지팡이 구슬 -->
                <circle cx="70" cy="25" r="8" fill="${orbColor}" opacity="0.9" />
                <circle cx="68" cy="23" r="3" fill="#ffffff" opacity="0.8" />
            </svg>`;
            return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
        }
    </script>
</body>
</html>
