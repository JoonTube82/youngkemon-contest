<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grade 6 English Magic RPG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.15.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.15.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.15.0/firebase-firestore-compat.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; touch-action: none; }
        
        /* 로그인 화면 */
        #login-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%); z-index: 100; padding: 20px;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); padding: 40px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .title-area h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-group { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a;
            color: white; font-size: 1rem; outline: none; transition: border 0.3s;
        }
        input:focus { border-color: var(--primary); }
        button#login-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary);
            color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }
        
        /* 모달 (팝업창) */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 200;
        }
        .modal {
            background: var(--card); padding: 30px; border-radius: 20px; max-width: 320px; width: 90%; text-align: center;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-cancel { background: #475569; color: white; }

        /* 게임 화면 */
        #game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
        canvas { width: 100%; height: 100%; background: #000; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; }
        #input-area {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; pointer-events: auto; width: 90%; max-width: 500px;
        }
        #word-display {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            font-size: 3rem; font-weight: bold; text-shadow: 0 0 20px rgba(99, 102, 241, 0.8);
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div class="title-area">
            <h1>Magic School</h1>
            <p>6학년 영어 RPG 🏝️</p>
        </div>
        <div class="input-group">
            <input type="text" id="student-name" placeholder="학생 이름을 입력하세요 (예: 테스트)">
            <input type="password" id="student-pw" placeholder="비밀번호 4자리">
            <button id="login-btn">마법 학교 입장하기</button>
            <p id="status-msg" style="font-size: 0.9rem; color: #94a3b8; margin-top: 10px;"></p>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title">알림</h3>
        <p id="modal-msg" style="margin: 15px 0; color: #cbd5e1;"></p>
        <div class="modal-btns">
            <button class="btn-confirm" id="modal-ok">확인</button>
            <button class="btn-cancel" id="modal-no">취소</button>
        </div>
    </div>
</div>

<div id="game-screen">
    <div id="word-display">READY?</div>
    <canvas id="gameCanvas"></canvas>
    <div id="input-area">
        <input type="text" id="word-input" placeholder="주문을 입력하세요!" autocomplete="off">
    </div>
</div>

<script>
// 선생님이 발급받으신 Firebase 설정 적용됨
const firebaseConfig = {
    apiKey: "AIzaSyCxfI0Zh4mxby13WigsFLNLDmA3ikkAIjE",
    authDomain: "grade6-english-rpg.firebaseapp.com",
    projectId: "grade6-english-rpg",
    storageBucket: "grade6-english-rpg.firebasestorage.app",
    messagingSenderId: "98075257077",
    appId: "1:98075257077:web:af48cfeda2300df967fdbc",
    measurementId: "G-DCBTPQ5T0N"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const STUDENT_LIST = ["서영", "단엘", "라희", "민지", "정훈", "문경", "소윤", "하율", "현수", "시율", "은영", "이담", "훈태", "마스터", "테스트", "선생님"];
let gameData = { level: 1, exp: 0, gold: 0 };
let currentStudent = "";

// 이미지 로드
window.charImg = new Image();
window.charImg.src = "https://raw.githubusercontent.com/username/repo/main/image_355059.jpg"; // 실제 깃허브 경로로 수정 필요

// UI 요소
const statusMsg = document.getElementById('status-msg');
const modalOverlay = document.getElementById('modal-overlay');

function showModal(title, msg, onConfirm, showCancel = true) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-msg').innerText = msg;
    modalOverlay.style.display = 'flex';
    document.getElementById('modal-no').style.display = showCancel ? 'block' : 'none';
    
    document.getElementById('modal-ok').onclick = () => {
        modalOverlay.style.display = 'none';
        if(onConfirm) onConfirm();
    };
    document.getElementById('modal-no').onclick = () => {
        modalOverlay.style.display = 'none';
    };
}

// 로그인 로직
document.getElementById('login-btn').onclick = async () => {
    const name = document.getElementById('student-name').value.trim();
    const pw = document.getElementById('student-pw').value.trim();

    if(!STUDENT_LIST.includes(name)) {
        showModal("경고", "명단에 없는 학생입니다.", null, false);
        return;
    }
    if(pw.length < 4) {
        showModal("경고", "비밀번호는 4자리 이상이어야 합니다.", null, false);
        return;
    }

    statusMsg.innerText = "마법 학교 접속 중...";
    
    try {
        await auth.signInAnonymously();
        const docRef = db.collection('artifacts').doc('magic-rpg').collection('public').doc('data').collection('studentProfiles').doc(name);
        const doc = await docRef.get();

        if(!doc.exists) {
            showModal("신규 등록", `${name}님, 현재 입력한 비밀번호를 영구 비밀번호로 사용할까요?`, async () => {
                await docRef.set({ password: pw, level: 1, exp: 0, createdAt: new Date() });
                enterGame(name, { level: 1 });
            });
        } else {
            if(doc.data().password === pw) {
                enterGame(name, doc.data());
            } else {
                showModal("오류", "비밀번호가 틀렸습니다.", null, false);
                statusMsg.innerText = "";
            }
        }
    } catch (e) {
        console.error(e);
        statusMsg.innerText = "접속 오류가 발생했습니다. (F5를 눌러주세요)";
    }
};

function enterGame(name, data) {
    currentStudent = name;
    gameData = {...gameData, ...data};
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    startGameLoop();
}

// 간단한 게임 루프 예시
function startGameLoop() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 캐릭터 그리기
        if(window.charImg.complete) {
            ctx.drawImage(window.charImg, 100, canvas.height/2 - 50, 100, 100);
        }
        
        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText(`${currentStudent} Lv.${gameData.level}`, 100, canvas.height/2 - 70);
        
        requestAnimationFrame(draw);
    }
    draw();
}
</script>
</body>
</html>
